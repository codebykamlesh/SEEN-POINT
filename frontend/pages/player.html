<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEEN POINT — Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-primary: #00d4ff;
            --clr-text-muted: #888;
            --font-body: 'Inter', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: var(--font-body); }

        #player-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #000; cursor: none;
        }
        #player-container.controls-visible { cursor: default; }

        #video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        #player-container.theater-mode #video { object-fit: cover; }

        #top-bar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px 28px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex; align-items: center; gap: 16px;
            transition: opacity 0.3s ease; z-index: 10;
        }
        .back-btn {
            display: flex; align-items: center; gap: 8px; color: #fff;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 8px 16px; font-size: 0.875rem; font-weight: 500;
            cursor: pointer; transition: background 0.2s; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        #video-title { font-size: 1.1rem; font-weight: 600; color: #fff; flex: 1; }

        .controls-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 30%, transparent 60%);
            opacity: 0; transition: opacity 0.3s ease; z-index: 5; pointer-events: none;
        }
        #player-container.controls-visible .controls-overlay { opacity: 1; }
        #player-container.controls-visible #top-bar { opacity: 1; }
        #player-container:not(.controls-visible) #top-bar { opacity: 0; pointer-events: none; }

        #center-play {
            position: absolute; width: 80px; height: 80px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            z-index: 6; opacity: 0; transform: scale(0.8); pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        #center-play.show { opacity: 1; transform: scale(1); }
        #center-play svg { width: 36px; height: 36px; fill: white; margin-left: 4px; }

        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0 20px 20px; z-index: 10;
            pointer-events: none; transition: opacity 0.3s ease;
        }
        #player-container.controls-visible #controls { pointer-events: all; opacity: 1; }
        #player-container:not(.controls-visible) #controls { opacity: 0; }

        .seek-container {
            position: relative; padding: 8px 0; cursor: pointer; margin-bottom: 12px;
        }
        .seek-track {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; position: relative; transition: height 0.2s;
        }
        .seek-container:hover .seek-track { height: 6px; }

        #seek-buffer, #seek-fill {
            position: absolute; top: 0; left: 0; height: 100%; border-radius: 2px; pointer-events: none;
        }
        #seek-buffer { background: rgba(255,255,255,0.3); }
        #seek-fill { background: var(--clr-primary); }
        #seek-thumb {
            position: absolute; top: 50%; width: 14px; height: 14px;
            background: #fff; border-radius: 50%; transform: translateY(-50%) scale(0);
            transition: transform 0.2s; pointer-events: none; box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .seek-container:hover #seek-thumb { transform: translateY(-50%) scale(1); }
        #seek-preview {
            position: absolute; bottom: 24px; background: rgba(0,0,0,0.85);
            color: #fff; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px;
            white-space: nowrap; pointer-events: none; transform: translateX(-50%); display: none;
        }
        .seek-container:hover #seek-preview { display: block; }

        .control-row { display: flex; align-items: center; gap: 12px; }
        .ctrl-btn {
            background: none; border: none; color: #fff; cursor: pointer; padding: 6px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.15s; min-width: 36px; min-height: 36px;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }
        .ctrl-btn svg { width: 22px; height: 22px; }
        .ctrl-btn.active { color: var(--clr-primary); }

        .time-display { font-size: 0.85rem; color: #fff; white-space: nowrap; }
        .time-sep { color: var(--clr-text-muted); }
        .spacer { flex: 1; }

        .volume-group { display: flex; align-items: center; gap: 8px; }
        .volume-slider-wrap { width: 0; overflow: hidden; transition: width 0.3s ease; }
        .volume-group:hover .volume-slider-wrap { width: 80px; }
        input[type="range"].vol-range {
            -webkit-appearance: none; appearance: none; width: 80px; height: 4px;
            background: rgba(255,255,255,0.3); border-radius: 2px; outline: none;
        }
        input[type="range"].vol-range::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; cursor: pointer;
        }

        .popup-menu {
            position: absolute; bottom: 70px; right: 0;
            background: rgba(15,15,15,0.97); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; min-width: 180px; padding: 8px 0;
            display: none; z-index: 20; backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .popup-menu.open { display: block; }
        .popup-menu h4 {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--clr-text-muted); padding: 8px 16px 4px;
        }
        .popup-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; font-size: 0.875rem; color: #ccc; cursor: pointer; transition: background 0.15s;
        }
        .popup-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .popup-item.active { color: var(--clr-primary); font-weight: 600; }
        .check-icon { width: 14px; height: 14px; opacity: 0; }
        .popup-item.active .check-icon { opacity: 1; }

        #skip-intro {
            position: absolute; bottom: 100px; right: 28px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(8px); color: #fff; font-size: 0.9rem; font-weight: 600;
            padding: 10px 20px; border-radius: 6px; cursor: pointer; display: none;
            transition: background 0.2s; z-index: 15;
        }
        #skip-intro:hover { background: rgba(255,255,255,0.25); }
        #skip-intro.visible { display: block; }

        #loading-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; gap: 16px;
        }
        .spinner {
            width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--clr-primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-overlay p { color: #888; font-size: 0.9rem; }

        #error-overlay {
            position: absolute; inset: 0; background: #000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; gap: 16px; text-align: center; padding: 40px;
        }
        #error-overlay.show { display: flex; }
        #error-overlay h2 { color: #fff; font-size: 1.5rem; }
        #error-overlay p { color: #888; max-width: 400px; line-height: 1.6; }
        .retry-btn {
            background: var(--clr-primary); color: #000; border: none;
            padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
        }

        #kb-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px;
            border-radius: 8px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; transition: opacity 0.3s; z-index: 30;
        }
        #kb-hint.show { opacity: 1; }

        .seek-flash {
            position: absolute; top: 50%; width: 80px; height: 80px; transform: translateY(-50%);
            background: rgba(255,255,255,0.08); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; color: #fff;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 6;
        }
        .seek-flash.show { opacity: 1; }
        .seek-flash svg { width: 24px; height: 24px; }
        #seek-back-flash { left: 25%; }
        #seek-fwd-flash  { left: 75%; }

        @media (max-width: 600px) {
            .ctrl-btn svg { width: 18px; height: 18px; }
            .time-display { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div id="player-container" class="controls-visible">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-msg">Loading video...</p>
    </div>
    <div id="error-overlay">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h2>Cannot Play Video</h2>
        <p id="error-msg">This video is not available. Admin needs to link a OneDrive file.</p>
        <button class="retry-btn" onclick="initPlayer()">Try Again</button>
        <a href="javascript:history.back()" style="color:#888;font-size:0.85rem;margin-top:8px">← Go Back</a>
    </div>

    <video id="video" preload="metadata" crossorigin="anonymous"></video>
    <div class="controls-overlay"></div>

    <div id="top-bar">
        <a href="javascript:history.back()" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back
        </a>
        <span id="video-title">Loading...</span>
        <button class="ctrl-btn" onclick="toggleTheaterMode()" title="Theater Mode (T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/></svg>
        </button>
        <button class="ctrl-btn" onclick="shareVideo()" title="Share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
    </div>

    <button id="skip-intro" onclick="skipIntro()">Skip Intro →</button>
    <div class="seek-flash" id="seek-back-flash">←10s</div>
    <div class="seek-flash" id="seek-fwd-flash">+10s→</div>
    <div id="center-play"><svg id="center-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    <div id="kb-hint"></div>

    <div id="controls">
        <div class="seek-container" id="seek-container"
             onmousemove="seekHover(event)"
             onmouseleave="document.getElementById('seek-preview').style.display='none'"
             onclick="seekClick(event)"
             onmousedown="startScrubbing()">
            <div class="seek-track">
                <div id="seek-buffer"></div>
                <div id="seek-fill"></div>
                <div id="seek-thumb"></div>
            </div>
            <div id="seek-preview">0:00</div>
        </div>
        <div class="control-row">
            <button class="ctrl-btn" id="play-btn" onclick="togglePlay()" title="Space">
                <svg id="play-icon" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button class="ctrl-btn" onclick="seekBy(-10)" title="← -10s">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12.5 3a9 9 0 1 0 9 9h-2"/><polyline points="11,3 13.5,3 13.5,5.5"/>
                    <text x="8" y="14" font-size="6" fill="white" stroke="none" font-weight="bold">10</text>
                </svg>
            </button>
            <button class="ctrl-btn" onclick="seekBy(10)" title="→ +10s">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M11.5 3a9 9 0 1 1-9 9h2"/><polyline points="13,3 10.5,3 10.5,5.5"/>
                    <text x="8" y="14" font-size="6" fill="white" stroke="none" font-weight="bold">10</text>
                </svg>
            </button>
            <div class="volume-group">
                <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="M">
                    <svg id="vol-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                </button>
                <div class="volume-slider-wrap">
                    <input type="range" class="vol-range" id="vol-range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
                </div>
            </div>
            <span class="time-display">
                <span id="current-time">0:00</span>
                <span class="time-sep"> / </span>
                <span id="duration-disp">0:00</span>
            </span>
            <div class="spacer"></div>
            <div style="position:relative">
                <button class="ctrl-btn" id="sub-btn" onclick="toggleMenu('sub-menu')" title="CC (C)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="6" y1="11" x2="10" y2="11"/><line x1="14" y1="11" x2="18" y2="11"/>
                        <line x1="6" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="18" y2="15"/>
                    </svg>
                </button>
                <div class="popup-menu" id="sub-menu">
                    <h4>Subtitles</h4>
                    <div id="sub-items">
                        <div class="popup-item active" onclick="selectSubtitle('off',this)">
                            <span>Off</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </div>
                </div>
            </div>
            <div style="position:relative">
                <button class="ctrl-btn" onclick="toggleMenu('quality-menu')" title="Quality">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </button>
                <div class="popup-menu" id="quality-menu">
                    <h4>Quality</h4>
                    <div id="quality-items">
                        <div class="popup-item active" onclick="selectQuality('auto','',this)">
                            <span>Auto</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </div>
                </div>
            </div>
            <div style="position:relative">
                <button class="ctrl-btn" onclick="toggleMenu('speed-menu')" title="Speed (S)">
                    <span id="speed-label" style="font-size:0.8rem;font-weight:700">1x</span>
                </button>
                <div class="popup-menu" id="speed-menu">
                    <h4>Speed</h4>
                    <div id="speed-items"></div>
                </div>
            </div>
            <button class="ctrl-btn" onclick="togglePiP()" title="PiP">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <rect x="12" y="10" width="8" height="5" rx="1" fill="currentColor"/>
                </svg>
            </button>
            <button class="ctrl-btn" id="fs-btn" onclick="toggleFullscreen()" title="F">
                <svg id="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
(async () => {
    const params = new URLSearchParams(location.search);
    const contentId = params.get('id');
    const autoplay  = params.get('autoplay') === 'true';
    const video     = document.getElementById('video');
    const container = document.getElementById('player-container');
    const SPEEDS    = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 2];
    let currentSpeed = 1, isScrubbing = false, duration = 0;
    let hideTimer = null;

    // Populate speed menu
    const speedEl = document.getElementById('speed-items');
    SPEEDS.forEach(s => {
        speedEl.innerHTML += `<div class="popup-item ${s===1?'active':''}" onclick="selectSpeed(${s},this)">
            <span>${s}x</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>`;
    });

    window.initPlayer = async function() {
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('error-overlay').classList.remove('show');
        if (!contentId) { showError('No content ID specified.'); return; }
        try {
            const res = await api.get(`/content/${contentId}`);
            const data = res.data;
            document.getElementById('video-title').textContent = data.title;
            document.title = `${data.title} — SEEN POINT`;

            // Load quality options
            if (data.qualities && data.qualities.length) {
                const qi = document.getElementById('quality-items');
                data.qualities.forEach(q => {
                    qi.innerHTML += `<div class="popup-item" onclick="selectQuality('${q.quality}','${q.onedrive_file_id}',this)">
                        <span>${q.quality}</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>`;
                });
            }

            // Load subtitle tracks
            if (data.subtitles && data.subtitles.length) {
                const si = document.getElementById('sub-items');
                data.subtitles.forEach(s => {
                    si.innerHTML += `<div class="popup-item" onclick="selectSubtitle('${s.language}',this)">
                        <span>${s.language.toUpperCase()}</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>`;
                    const t = document.createElement('track');
                    t.kind = 'subtitles'; t.label = s.language;
                    t.srclang = s.language; t.src = s.file_url;
                    video.appendChild(t);
                });
            }

            let src = null;
            if (data.stream_url) src = `${API_BASE.replace('/api','')}${data.stream_url}`;
            else if (data.video_url) src = data.video_url;

            if (!src) { showError('No video file linked. Admin must connect a OneDrive file.'); return; }

            document.getElementById('loading-msg').textContent = 'Loading stream...';
            video.src = src;
            video.load();

            const saved = localStorage.getItem(`sp_progress_${contentId}`);
            if (saved && parseFloat(saved) > 10) video.currentTime = parseFloat(saved);
            if (autoplay) video.play().catch(() => {});
        } catch(err) { showError(err.message || 'Failed to load.'); }
    };

    function showError(msg) {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error-overlay').classList.add('show');
    }

    video.addEventListener('loadedmetadata', () => {
        duration = video.duration;
        document.getElementById('duration-disp').textContent = formatTime(duration);
        document.getElementById('loading-overlay').style.display = 'none';
    });

    video.addEventListener('timeupdate', () => {
        if (isScrubbing || !duration) return;
        const p = video.currentTime / duration;
        document.getElementById('seek-fill').style.width = (p*100) + '%';
        document.getElementById('seek-thumb').style.left = (p*100) + '%';
        document.getElementById('current-time').textContent = formatTime(video.currentTime);
        localStorage.setItem(`sp_progress_${contentId}`, video.currentTime);
        document.getElementById('skip-intro').classList.toggle('visible', video.currentTime > 5 && video.currentTime < 90);
    });

    video.addEventListener('progress', () => {
        if (!duration) return;
        const b = video.buffered;
        if (b.length > 0) document.getElementById('seek-buffer').style.width = (b.end(b.length-1)/duration*100) + '%';
    });

    video.addEventListener('play', () => {
        document.getElementById('play-icon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        flashCenter('pause');
    });
    video.addEventListener('pause', () => {
        document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
        flashCenter('play');
    });
    video.addEventListener('waiting', () => {
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('loading-msg').textContent = 'Buffering...';
    });
    video.addEventListener('canplay', () => { document.getElementById('loading-overlay').style.display = 'none'; });
    video.addEventListener('ended', () => { localStorage.removeItem(`sp_progress_${contentId}`); });

    function showControls() {
        container.classList.add('controls-visible');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { if (!video.paused) container.classList.remove('controls-visible'); }, 3000);
    }

    container.addEventListener('mousemove', showControls);
    container.addEventListener('touchstart', showControls);
    container.addEventListener('click', e => {
        if (e.target === video || e.target === container || e.target.classList.contains('controls-overlay')) togglePlay();
    });

    window.togglePlay = () => { video.paused ? video.play() : video.pause(); showControls(); };
    window.seekBy = s => { video.currentTime = Math.max(0, Math.min(duration, video.currentTime + s)); };
    window.toggleMute = () => { video.muted = !video.muted; showKbHint(video.muted ? 'Muted' : 'Unmuted'); };
    window.setVolume = v => { video.volume = parseFloat(v); video.muted = parseFloat(v) === 0; };

    video.addEventListener('volumechange', () => {
        document.getElementById('vol-range').value = video.muted ? 0 : video.volume;
        const icon = document.getElementById('vol-icon');
        icon.innerHTML = (video.muted || video.volume === 0)
            ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
            : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    });

    window.selectSpeed = (s, el) => {
        currentSpeed = s; video.playbackRate = s;
        document.getElementById('speed-label').textContent = s + 'x';
        document.querySelectorAll('#speed-items .popup-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); toggleMenu('speed-menu'); showKbHint(`Speed: ${s}x`);
    };

    window.selectSubtitle = (lang, el) => {
        Array.from(video.textTracks).forEach(t => t.mode = lang === 'off' ? 'disabled' : (t.language === lang ? 'showing' : 'disabled'));
        document.querySelectorAll('#sub-items .popup-item').forEach(i => i.classList.remove('active'));
        if (el && el.classList) el.classList.add('active');
        document.getElementById('sub-btn').classList.toggle('active', lang !== 'off');
        toggleMenu('sub-menu');
    };

    window.selectQuality = (q, fileId, el) => {
        document.querySelectorAll('#quality-items .popup-item').forEach(i => i.classList.remove('active'));
        if (el && el.classList) el.classList.add('active');
        toggleMenu('quality-menu');
        if (q !== 'auto' && fileId) {
            const t = video.currentTime, p = !video.paused;
            video.src = `${API_BASE.replace('/api','')}/api/onedrive/stream/${fileId}`;
            video.load(); video.currentTime = t;
            if (p) video.play().catch(() => {});
        }
        showKbHint(`Quality: ${q}`);
    };

    window.toggleFullscreen = () => {
        document.fullscreenElement ? document.exitFullscreen() : container.requestFullscreen().catch(() => {});
    };
    document.addEventListener('fullscreenchange', () => {
        document.getElementById('fs-icon').innerHTML = document.fullscreenElement
            ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="17" y2="7"/><line x1="3" y1="21" x2="10" y2="14"/>'
            : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
    });

    window.toggleTheaterMode = () => container.classList.toggle('theater-mode');
    window.togglePiP = async () => {
        document.pictureInPictureElement ? await document.exitPictureInPicture()
            : await video.requestPictureInPicture().catch(() => showKbHint('PiP not supported'));
    };
    window.skipIntro = () => { video.currentTime = 90; document.getElementById('skip-intro').classList.remove('visible'); };
    window.shareVideo = () => {
        navigator.clipboard ? navigator.clipboard.writeText(location.href).then(() => showKbHint('Link copied!'))
            : showKbHint('Copy URL: ' + location.href);
    };

    window.seekHover = e => {
        const rect = e.currentTarget.querySelector('.seek-track').getBoundingClientRect();
        const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const preview = document.getElementById('seek-preview');
        preview.style.left = (p*100) + '%'; preview.style.display = 'block';
        preview.textContent = formatTime(p * duration);
    };

    window.seekClick = e => {
        if (isScrubbing) return;
        const rect = e.currentTarget.querySelector('.seek-track').getBoundingClientRect();
        video.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * duration;
    };

    window.startScrubbing = () => {
        isScrubbing = true;
        const scrub = e => {
            const rect = document.querySelector('.seek-track').getBoundingClientRect();
            const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            document.getElementById('seek-fill').style.width = (p*100) + '%';
            document.getElementById('current-time').textContent = formatTime(p * duration);
            video.currentTime = p * duration;
        };
        document.addEventListener('mousemove', scrub);
        document.addEventListener('mouseup', () => { isScrubbing = false; document.removeEventListener('mousemove', scrub); }, { once: true });
    };

    window.toggleMenu = id => {
        const m = document.getElementById(id); const open = m.classList.contains('open');
        document.querySelectorAll('.popup-menu').forEach(x => x.classList.remove('open'));
        if (!open) m.classList.add('open');
    };
    document.addEventListener('click', e => {
        if (!e.target.closest('.ctrl-btn') && !e.target.closest('.popup-menu'))
            document.querySelectorAll('.popup-menu').forEach(m => m.classList.remove('open'));
    });

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch(e.code) {
            case 'Space': e.preventDefault(); togglePlay(); break;
            case 'ArrowLeft':  e.preventDefault(); seekBy(-10); flashSeek('back'); break;
            case 'ArrowRight': e.preventDefault(); seekBy(10); flashSeek('fwd'); break;
            case 'ArrowUp':    e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); break;
            case 'ArrowDown':  e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); break;
            case 'KeyF': toggleFullscreen(); break;
            case 'KeyM': toggleMute(); break;
            case 'KeyT': toggleTheaterMode(); break;
            case 'KeyS': {
                const idx = SPEEDS.indexOf(currentSpeed);
                const ns = SPEEDS[(idx + 1) % SPEEDS.length];
                const el = document.querySelector(`[onclick="selectSpeed(${ns},this)"]`);
                if (el) selectSpeed(ns, el); break;
            }
        }
    });

    function flashCenter(action) {
        const el = document.getElementById('center-play');
        document.getElementById('center-icon').innerHTML = action === 'play'
            ? '<polygon points="5,3 19,12 5,21"/>'
            : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 600);
    }

    function flashSeek(dir) {
        const el = document.getElementById(`seek-${dir}-flash`);
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 600);
    }

    function showKbHint(msg) {
        const el = document.getElementById('kb-hint');
        el.textContent = msg; el.classList.add('show');
        clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1500);
    }

    function formatTime(s) {
        if (isNaN(s)) return '0:00';
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }

    await initPlayer();
    showControls();
})();
</script>
</body>
</html>
