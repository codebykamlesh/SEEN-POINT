<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEEN POINT | Watch</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(0, 212, 255, 0.18), transparent 40%),
                #05070b;
            color: var(--clr-white);
        }

        .watch-shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .watch-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 5;
            background: linear-gradient(to bottom, rgba(5, 7, 11, 0.95), rgba(5, 7, 11, 0.72));
            backdrop-filter: blur(14px);
        }

        .watch-main {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 12px 0 32px;
        }

        .player-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        .player-frame video,
        .player-frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: none;
            background: #000;
        }

        .player-frame.active-video video,
        .player-frame.active-iframe iframe {
            display: block;
        }

        .player-poster {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(0);
            z-index: 0; /* Keep poster behind actual playback */
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .player-poster::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.28));
        }

        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 2;
            /* Let users interact with the underlying player (especially trailer),
               while still keeping buttons/links clickable. */
            pointer-events: none;
        }

        /* Ensure playback is visible above the poster layer. */
        .player-frame video,
        .player-frame iframe {
            position: relative;
            z-index: 1;
        }

        /* When guest users play trailer, keep the overlay readable but compact
           so the video remains visible behind it. */
        .player-overlay[data-variant="login"] {
            align-items: flex-start;
            justify-content: center;
            padding-top: 18px;
        }

        .player-overlay[data-variant="login"] .overlay-card {
            width: min(640px, 100%);
            padding: 18px;
            border-radius: 18px;
            background: rgba(7, 10, 15, 0.62);
        }

        .overlay-card {
            width: min(460px, 100%);
            padding: 28px;
            border-radius: 22px;
            background: rgba(7, 10, 15, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }

        .watch-meta {
            display: grid;
            gap: 18px;
            margin-top: 24px;
        }

        .watch-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .watch-note {
            color: var(--clr-text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .watch-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--clr-primary);
        }

        .watch-status::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
        }

        .watch-error {
            display: none;
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.25);
            color: #ffb3b3;
        }

        .watch-error.show {
            display: block;
        }

        @media (max-width: 768px) {
            .watch-topbar {
                padding: 16px;
            }

            .watch-main {
                width: min(100%, calc(100% - 20px));
                padding-top: 8px;
            }

            .overlay-card {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="watch-shell">
        <header class="watch-topbar">
            <a href="javascript:history.back()" class="btn btn-ghost btn-sm">Back</a>
            <div id="page-title" style="font-weight:700">Loading...</div>
            <div id="auth-chip" class="watch-status" style="visibility:hidden">Member Access</div>
        </header>

        <main class="watch-main">
            <section class="player-frame" id="player-frame">
                <div class="player-poster" id="player-poster"></div>
                <div class="player-overlay" id="player-overlay">
                    <div class="overlay-card">
                        <div class="watch-status" id="overlay-status">Preparing Stream</div>
                        <h1 id="overlay-title" style="margin:14px 0 10px;font-size:clamp(1.6rem,3vw,2.3rem)">Loading...</h1>
                        <p id="overlay-text" class="watch-note">Fetching playback details.</p>
                        <div class="watch-actions" id="overlay-actions" style="justify-content:center"></div>
                    </div>
                </div>
                <video id="videoPlayer" controls playsinline preload="metadata">
                    <source id="video-source" type="video/mp4" src="" />
                </video>
                <iframe
                    id="youtube-player"
                    title="SEEN POINT trailer or movie player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>
            </section>

            <section class="watch-meta">
                <div>
                    <div class="watch-status" id="content-mode">Playback</div>
                    <h2 id="content-title" style="margin:10px 0 8px;font-size:clamp(1.8rem,4vw,2.8rem)">Loading...</h2>
                    <p id="content-summary" class="watch-note"></p>
                </div>
                <div id="content-details" style="display:flex;flex-wrap:wrap;gap:10px"></div>
                <div id="watch-error" class="watch-error"></div>
            </section>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
    (async () => {
        const params = new URLSearchParams(window.location.search);
        const contentId = params.get('id');
        const forceTrailer = params.get('trailer') === 'true';
        const autoplay = params.get('autoplay') !== 'false';
        const videoPlayer = document.getElementById('videoPlayer');
        const videoSource = document.getElementById('video-source');
        const youtubePlayer = document.getElementById('youtube-player');
        const playerPoster = document.getElementById('player-poster');
        const playerFrame = document.getElementById('player-frame');
        const overlay = document.getElementById('player-overlay');
        const overlayStatus = document.getElementById('overlay-status');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayText = document.getElementById('overlay-text');
        const overlayActions = document.getElementById('overlay-actions');
        const authChip = document.getElementById('auth-chip');
        const errorBox = document.getElementById('watch-error');

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        function clearError() {
            errorBox.classList.remove('show');
            errorBox.textContent = '';
        }

        function formatMeta(content) {
            return [
                content.content_type,
                content.release_year,
                content.duration_min ? utils.formatRuntime(content.duration_min) : null,
                content.maturity_rating,
            ].filter(Boolean).map(value =>
                `<span class="badge badge-outline">${String(value).toUpperCase ? String(value).toUpperCase() : value}</span>`
            ).join('');
        }

        function withAuthToken(url) {
            if (!url || !url.startsWith('/api/onedrive/stream/')) return url;
            const token = auth.getToken();
            console.log('[player] withAuthToken - has JWT:', !!token);
            if (!token) return url;
            return `${API_ORIGIN}${url}?token=${encodeURIComponent(token)}`;
        }

        function activateHtml5(src) {
            playerFrame.classList.remove('active-iframe');
            playerFrame.classList.add('active-video');
            youtubePlayer.src = '';
            if (playerPoster) playerPoster.style.opacity = '0';
            // Use <source> so we can explicitly set type and then call load().
            videoPlayer.pause();
            videoSource.src = src;
            videoPlayer.load();

            console.log('[player] Video URL:', src);
            if (autoplay) {
                videoPlayer.play().catch(() => {});
            }
        }

        function activateIframe(src) {
            playerFrame.classList.remove('active-video');
            playerFrame.classList.add('active-iframe');
            videoPlayer.pause();
            videoSource.src = '';
            videoPlayer.load();
            if (playerPoster) playerPoster.style.opacity = '0';
            console.log('[player] YouTube URL:', src);
            youtubePlayer.src = src;
        }

        function setOverlay({ status, title, text, actions = [] }) {
            overlayStatus.textContent = status;
            overlayTitle.textContent = title;
            overlayText.textContent = text;
            overlayActions.innerHTML = actions.map(action => {
                if (action.href) {
                    return `<a class="btn ${action.variant || 'btn-primary'}" href="${action.href}">${action.label}</a>`;
                }

                return `<button class="btn ${action.variant || 'btn-primary'}" data-action="${action.id}">${action.label}</button>`;
            }).join('');

            actions.forEach(action => {
                if (!action.onClick) return;
                const button = overlayActions.querySelector(`[data-action="${action.id}"]`);
                if (button) button.addEventListener('click', action.onClick);
            });
        }

        if (!contentId) {
            setOverlay({
                status: 'Playback Error',
                title: 'No movie selected',
                text: 'Choose a title from the catalog and try again.',
                actions: [{ label: 'Browse Titles', href: '/pages/browse.html' }],
            });
            return;
        }

        try {
            const response = await api.get(`/content/${contentId}`);
            const content = response.data;
            const isAuthenticated = !!content.access?.isAuthenticated;

            const token = auth.getToken();
            console.log('[player] token:', token ? `${token.slice(0, 16)}...` : null);
            console.log('[player] trailer_url:', content.trailer_url);
            console.log('[player] full_video_url:', content.full_video_url);
            console.log('[player] API response', {
                contentId,
                isAuthenticated,
                trailer_embed_url_present: !!content.trailer_embed_url,
                playback: content.playback,
            });
            const playback = forceTrailer && content.trailer_embed_url
                ? { kind: 'youtube', src: content.trailer_embed_url, label: 'Trailer' }
                : content.playback;

            document.title = `${content.title} | SEEN POINT`;
            document.getElementById('page-title').textContent = content.title;
            document.getElementById('content-title').textContent = content.title;
            document.getElementById('content-summary').textContent = content.synopsis || 'No synopsis available yet.';
            document.getElementById('content-details').innerHTML = formatMeta(content);
            document.getElementById('content-mode').textContent = forceTrailer
                ? 'Trailer'
                : (isAuthenticated ? 'Member Playback' : 'Guest Preview');
            document.getElementById('player-poster').style.backgroundImage = `url('${content.backdrop_url || content.poster_url || ''}')`;

            if (isAuthenticated && !forceTrailer) {
                authChip.style.visibility = 'visible';
                authChip.textContent = 'Member Access';
            }

            if (!isAuthenticated && !forceTrailer) {
                overlay.dataset.variant = 'login';
                setOverlay({
                    status: 'Guest Preview',
                    title: content.title,
                    text: 'Login to watch full movie',
                    actions: [
                        {
                            id: 'login',
                            label: 'Login to watch full movie',
                            variant: 'btn-primary',
                            onClick: () => auth.requireLogin(`/pages/player.html?id=${contentId}&autoplay=true`),
                        },
                        content.trailer_embed_url && !forceTrailer
                            ? {
                                href: `/pages/player.html?id=${contentId}&trailer=true`,
                                label: 'Watch Trailer',
                                variant: 'btn-secondary',
                            }
                            : null,
                        {
                            href: `/pages/detail.html?id=${contentId}`,
                            label: 'Back to Details',
                            variant: 'btn-ghost',
                        },
                    ].filter(Boolean),
                });

                if (content.trailer_embed_url) {
                    activateIframe(content.trailer_embed_url);
                }

                return;
            }

            authChip.style.visibility = forceTrailer ? 'visible' : authChip.style.visibility;
            if (forceTrailer) {
                authChip.textContent = 'Trailer Mode';
            }

            if (!playback || !playback.src) {
                setOverlay({
                    status: 'Unavailable',
                    title: content.title,
                    text: content.playback_error || 'This title does not have a playable source configured yet.',
                    actions: [
                        { href: `/pages/detail.html?id=${contentId}`, label: 'Back to Details', variant: 'btn-secondary' },
                    ],
                });
                showError(content.playback_error || 'Playback source missing for this title.');
                return;
            }

            clearError();
            overlay.style.display = 'none';
            overlay.dataset.variant = '';

            if (playback.kind === 'youtube') {
                activateIframe(playback.src);
            } else {
                activateHtml5(withAuthToken(playback.src));
            }

            const profile = auth.getProfile();
            if (profile && content.content_type === 'movie') {
                videoPlayer.addEventListener('timeupdate', utils.debounce(() => {
                    if (!videoPlayer.duration || videoPlayer.paused) return;
                    api.post('/user/watch-history', {
                        profileId: profile.id,
                        contentId,
                        progressSeconds: Math.floor(videoPlayer.currentTime),
                        totalSeconds: Math.floor(videoPlayer.duration),
                    }).catch(() => {});
                }, 3000));
            }
        } catch (error) {
            setOverlay({
                status: 'Playback Error',
                title: 'Unable to load this title',
                text: error.message || 'Something went wrong while loading the player.',
                actions: [
                    { href: '/pages/browse.html', label: 'Browse Titles', variant: 'btn-primary' },
                    { href: 'javascript:history.back()', label: 'Go Back', variant: 'btn-ghost' },
                ],
            });
            showError(error.message || 'Failed to load playback.');
        }

        // Debug/error handling for HTML5 playback.
        // (Trailer uses YouTube iframe; this covers mp4/OneDrive streaming sources.)
        videoPlayer.onerror = () => {
            console.error('[player] Video failed to load', {
                src: videoSource.src || videoPlayer.currentSrc || '(unknown)',
                error: videoPlayer.error,
            });
            showError('Video failed to load. Confirm the source is an MP4/H.264 stream and that the URL is reachable.');
        };

        videoPlayer.addEventListener('error', () => {
            console.error('[player] Video error event', {
                src: videoSource.src || videoPlayer.currentSrc || '(unknown)',
                error: videoPlayer.error,
            });
            showError('Playback error detected while loading the video stream.');
        });
    })();
    </script>
</body>
</html>
